<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银行数据获取 - 股票价值分析平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1724 0%, #1a2332 50%, #0d1b2a 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 40px 20px;
        }

        .page-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #8899aa;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #4fc3f7;
        }

        .page-title {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 8px;
            text-align: center;
        }

        .page-subtitle {
            color: #8899aa;
            font-size: 0.95rem;
            margin-bottom: 40px;
            text-align: center;
        }

        .crawl-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
        }

        .crawl-form {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #8899aa;
        }

        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #4fc3f7;
        }

        .form-group input::placeholder {
            color: #556677;
        }

        .form-group select option {
            background: #1a2332;
            color: #ffffff;
        }

        .btn-crawl {
            padding: 10px 28px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: #0d1b2a;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-crawl:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.3);
        }

        .btn-crawl:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 结果弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a2332;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 36px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal h3 {
            font-size: 1.3rem;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .modal .modal-subtitle {
            color: #8899aa;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.5rem;
            color: #8899aa;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #ffffff;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .data-item .data-label {
            font-size: 0.8rem;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .data-item .data-value {
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 600;
        }

        .data-item .data-value.positive {
            color: #00e676;
        }

        .data-item .data-value.negative {
            color: #ff5252;
        }

        .data-item .data-value.na {
            color: #556677;
            font-size: 0.9rem;
        }

        .modal-status {
            text-align: center;
            padding: 20px;
            font-size: 1rem;
        }

        .modal-status.success {
            color: #00e676;
        }

        .modal-status.error {
            color: #ff5252;
        }

        .section-title {
            font-size: 0.85rem;
            color: #4fc3f7;
            margin-top: 16px;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(79, 195, 247, 0.2);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <a class="back-btn" href="home.html">← 返回首页</a>

        <h1 class="page-title">🏦 银行财务数据获取</h1>
        <p class="page-subtitle">输入银行股代码，从东方财富自动获取银行财务指标并存入数据库</p>

        <div class="crawl-section">
            <div class="crawl-form">
                <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="stockCode" placeholder="如 601398" maxlength="6">
                </div>
                <div class="form-group">
                    <label>年份</label>
                    <select id="reportYear">
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024" selected>2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>报告期</label>
                    <select id="reportQuarter">
                        <option value="Q1">一季报 (Q1)</option>
                        <option value="Q2">半年报 (Q2)</option>
                        <option value="Q3">三季报 (Q3)</option>
                        <option value="Q4" selected>年报 (Q4)</option>
                    </select>
                </div>
                <button class="btn-crawl" id="btnCrawl" onclick="fetchData()">获取数据</button>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModalDirect()">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1/crawler';

        async function fetchData() {
            const stockCode = document.getElementById('stockCode').value.trim();
            const year = document.getElementById('reportYear').value;
            const quarter = document.getElementById('reportQuarter').value;

            if (!stockCode) {
                alert('请输入股票代码');
                return;
            }

            if (stockCode.length !== 6 || isNaN(stockCode)) {
                alert('请输入6位数字股票代码');
                return;
            }

            const reportPeriod = year + quarter;
            const btn = document.getElementById('btnCrawl');
            btn.disabled = true;
            btn.textContent = '获取中...';

            try {
                const url = `${API_BASE}/single?stockCode=${stockCode}&reportPeriod=${reportPeriod}`;
                const response = await fetch(url);
                const result = await response.json();

                if (result.success) {
                    // 获取成功后，查询数据库中的完整数据
                    const dataUrl = `http://localhost:8080/api/v1/bank-stock-data/list?reportPeriod=${reportPeriod}`;
                    const dataResponse = await fetch(dataUrl);
                    const dataList = await dataResponse.json();

                    // 找到当前股票的数据
                    const stockData = dataList.find(d => d.stockCode === stockCode);
                    showResultModal(result, stockData, reportPeriod);
                } else {
                    showErrorModal(result);
                }
            } catch (error) {
                showErrorModal({ stockName: stockCode, message: '网络请求失败: ' + error.message });
            } finally {
                btn.disabled = false;
                btn.textContent = '获取数据';
            }
        }

        function showResultModal(result, stockData, reportPeriod) {
            const content = document.getElementById('modalContent');

            const fields = [
                { section: '盈利能力' },
                { label: 'ROE (加权)', key: 'roe', unit: '%' },
                { label: '净息差', key: 'nim', unit: '%' },
                { label: '成本收入比', key: 'costIncomeRatio', unit: '%' },
                { section: '资产质量' },
                { label: '不良贷款率', key: 'nplRatio', unit: '%', reverse: true },
                { label: '拨备覆盖率', key: 'provisionCoverageRatio', unit: '%' },
                { label: '关注类贷款占比', key: 'specialMentionLoanRatio', unit: '%', reverse: true },
                { section: '成长性' },
                { label: '营收增长率', key: 'revenueGrowthRate', unit: '%' },
                { label: '净利润增长率', key: 'netProfitGrowthRate', unit: '%' },
                { label: '贷款增长率', key: 'loanGrowthRate', unit: '%' },
                { section: '估值' },
                { label: '市净率 PB', key: 'pb', unit: '' },
                { label: '市盈率 PE', key: 'pe', unit: '' },
                { label: '股息率', key: 'dividendYield', unit: '%' },
                { section: '资本充足性' },
                { label: '核心一级资本充足率', key: 'coreCapitalAdequacyRatio', unit: '%' },
                { label: '资本充足率', key: 'capitalAdequacyRatio', unit: '%' },
            ];

            let html = `
                <h3>✅ ${result.stockName} (${result.stockCode})</h3>
                <p class="modal-subtitle">报告期：${reportPeriod} | 数据来源：东方财富</p>
                <div class="data-grid">
            `;

            for (const field of fields) {
                if (field.section) {
                    html += `<div class="section-title">${field.section}</div>`;
                    continue;
                }

                const value = stockData ? stockData[field.key] : null;
                let displayValue = '暂无数据';
                let valueClass = 'na';

                if (value !== null && value !== undefined) {
                    const numVal = parseFloat(value);
                    displayValue = numVal.toFixed(2) + field.unit;
                    if (field.reverse) {
                        valueClass = numVal <= 1.5 ? 'positive' : numVal > 3 ? 'negative' : '';
                    } else if (field.unit === '%' && field.key.includes('Growth')) {
                        valueClass = numVal > 0 ? 'positive' : numVal < 0 ? 'negative' : '';
                    }
                }

                html += `
                    <div class="data-item">
                        <div class="data-label">${field.label}</div>
                        <div class="data-value ${valueClass}">${displayValue}</div>
                    </div>
                `;
            }

            html += '</div>';
            content.innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function showErrorModal(result) {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h3>❌ 获取失败</h3>
                <p class="modal-subtitle">${result.stockName || ''} (${result.stockCode || ''})</p>
                <div class="modal-status error">${result.message}</div>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal(event) {
            if (event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        function closeModalDirect() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // 回车触发获取
        document.getElementById('stockCode').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') fetchData();
        });
    </script>
</body>
</html>

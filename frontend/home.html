<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票价值分析平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1724 0%, #1a2332 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .home-container {
            text-align: center;
            padding: 40px;
        }

        .home-title {
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .home-subtitle {
            font-size: 1.1rem;
            color: #8899aa;
            margin-bottom: 60px;
        }

        .card-grid {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-card {
            width: 320px;
            padding: 50px 36px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .nav-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-card.disabled:hover {
            transform: none;
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: none;
        }

        .nav-card .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .nav-card h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .nav-card p {
            font-size: 0.95rem;
            color: #8899aa;
            line-height: 1.6;
        }

        .nav-card .badge {
            display: inline-block;
            margin-top: 16px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .nav-card.active-card .badge {
            background: rgba(0, 230, 118, 0.15);
            color: #00e676;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h1 class="home-title">📊 股票价值分析平台</h1>
        <p class="home-subtitle">选择分析模块开始使用</p>

        <div class="card-grid">
            <div class="nav-card disabled" onclick="return false;">
                <div class="icon">📈</div>
                <h2>股票价值分析系统</h2>
                <p>通用股票多维度价值评估模型，适用于各行业股票的综合分析</p>
                <span class="badge">敬请期待</span>
            </div>

            <a class="nav-card active-card" href="index.html">
                <div class="icon">🏦</div>
                <h2>银行股票价值分析系统</h2>
                <p>五维度百分位排名评分模型，专注银行股的盈利能力、资产质量、成长性等分析</p>
                <span class="badge">可用</span>
            </a>
        </div>
    </div>
</body>
</html>
